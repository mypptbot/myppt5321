<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳轉系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { max-width: 100%; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="status-text">系統讀取中...</h2>
        
        <img id="expire-image" src="" style="display: none;" alt="已過期">
    </div>

    <script>
        try {
            // ================= 1. 你的每日資料庫 =================
            const db = {
                "day1": {
                    shopee: "https://s.shopee.tw/9Kfueole9C",
                    photo: "https://i.ibb.co/8DNBj5dd/IMG-8002.jpg", // 你的攝影作品或圖片連結
                    expire: "2026/06/25 19:00:00" // 測試用，設定在明天過期
                }
    "day2": {
                    shopee: "https://s.shopee.tw/9Kfueole9C",
                    photo: "https://i.ibb.co/FLn51xmC/IMG-8019.png", // 你的攝影作品或圖片連結
                    expire: "2027/06/25 19:00:00"
            };
            
            // 你的「已過期」提示圖片連結
            const expirePicUrl = "https://i.ibb.co/cKWN3bhb/16-20260624175826.png";
            // =====================================================

            // 2. 抓取網址參數與網頁元素
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const statusBox = document.getElementById("status-text");
            const expireImgTag = document.getElementById("expire-image");

            // 3. 開始執行判斷邏輯
            if (!id) {
                statusBox.innerHTML = "⚠️ 網址缺少代號<br>請在網址最後加上 ?id=day1";
            } else if (!db[id]) {
                statusBox.innerHTML = "⚠️ 找不到資料<br>請檢查是否已經新增了 " + id + " 的連結";
            } else {
                const data = db[id];
                const now = new Date();
                const expireTime = new Date(data.expire);

                // 判斷是否超過 24 小時
                if (now > expireTime) {
                    statusBox.innerHTML = "⏳ 此連結已超過 24 小時，已經失效囉！";
                    expireImgTag.src = expirePicUrl;
                    expireImgTag.style.display = "block";
                } else {
                    statusBox.innerHTML = "🔄 正在為您跳轉中...";
                    const key = "viewed_" + id;
                    
                    // 判斷是否點擊過
                    if (!localStorage.getItem(key)) {
                        localStorage.setItem(key, "yes");
                        window.location.href = data.shopee;
                    } else {
                        window.location.href = data.photo;
                    }
                }
            }
        } catch (err) {
            // 萬一程式出錯，把錯誤原因印出來，不留白
            document.getElementById("status-text").innerHTML = "❌ 發生錯誤：" + err.message;
        }
    </script>
</body>
</html>
